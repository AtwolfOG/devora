        type: string
      name:
        type: string
      password:
        type: string
    type: object
  auth.SignupResponse:
    properties:
      access_token:
        type: string
    type: object
  database.Answer:
    properties:
      answer:
        type: string
      created_at:
        type: string
      question_id:
        type: integer
      room_id:
        type: string
      updated_at:
        type: string
    type: object
  database.CodeSnippet:
