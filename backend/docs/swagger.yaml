      created_at:
        type: string
      language:
        $ref: '#/definitions/database.Language'
      name:
        type: string
      question_id:
        type: integer
      room_id:
        type: string
      updated_at:
        type: string
    type: object
  database.Language:
    enum:
    - python
    - javascript
    - go
    type: string
    x-enum-varnames:
    - LanguagePython
    - LanguageJavascript
    - LanguageGo
  room.CreateQuestionRequest:
    properties:
      code:
        type: string
      description:
        type: string
      is_code:
        type: boolean
      language:
        type: string
      title:
        type: string
    type: object
  room.CreateRoomRequest:
    properties:
      company:
        type: string
      description:
        type: string
      role:
        type: string
      start_time:
        type: string
    type: object
  room.NullBool:
    properties:
      bool:
        type: boolean
      valid:
        type: boolean
    type: object
  room.NullString:
    properties:
      string:
        type: string
      valid:
        type: boolean
    type: object
  room.NullTime:
    properties:
      time:
        type: string
      valid:
        type: boolean
    type: object
  room.NullUUID:
    properties:
      uuid:
        type: string
      valid:
        type: boolean
    type: object
  room.RoomDTO:
    properties:
      company:
        type: string
      created_at:
        type: string
      description:
        type: string
      ended_at:
        $ref: '#/definitions/room.NullTime'
      feedback:
        $ref: '#/definitions/room.NullString'
      id:
        type: string
      owner_id:
        type: string
      participant_id:
        $ref: '#/definitions/room.NullUUID'
      passed:
        $ref: '#/definitions/room.NullBool'
      role:
        type: string
      start_time:
        type: string
      started_at:
        $ref: '#/definitions/room.NullTime'
      status:
        type: string
      updated_at:
        type: string
    type: object
  room.RoomDetailsResponseDTO:
    properties:
      company:
        type: string
      created_at:
        type: string
      description:
        type: string
      ended_at:
        $ref: '#/definitions/room.NullTime'
      feedback:
        $ref: '#/definitions/room.NullString'
      id:
        type: string
      is_owner:
        type: boolean
      is_participant:
        type: boolean
      owner_id:
        type: string
      participant_id:
        $ref: '#/definitions/room.NullUUID'
      passed:
        $ref: '#/definitions/room.NullBool'
      role:
        type: string
      start_time:
        type: string
      started_at:
        $ref: '#/definitions/room.NullTime'
      status:
        type: string
      updated_at:
        type: string
    type: object
