basePath: /
definitions:
  auth.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  auth.SignupRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        type: string
    type: object
  auth.SignupResponse:
    properties:
      access_token:
        type: string
    type: object
  auth.StatusResponse:
    properties:
      loggedIn:
        type: boolean
    type: object
  lib.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  lib.MessageResponse:
    properties:
      message:
        type: string
    type: object
  lib.OAuthLinkResponse:
    properties:
      url:
        type: string
    type: object
  room.AnswerDTO:
    properties:
      answer:
        type: string
      created_at:
        type: string
      question_id:
        type: integer
      room_id:
        type: string
      updated_at:
        type: string
    type: object
  room.CodeSnippetDTO:
    properties:
      code:
        type: string
      created_at:
        type: string
      language:
        type: string
      name:
        type: string
      question_id:
        type: integer
      room_id:
        type: string
      updated_at:
        type: string
    type: object
  room.CreateQuestionRequest:
    properties:
      code:
        type: string
      description:
        type: string
      is_code:
        type: boolean
      language:
        type: string
      title:
        type: string
    type: object
  room.CreateRoomRequest:
    properties:
      company:
        type: string
      description:
        type: string
      role:
        type: string
      start_time:
        type: string
    type: object
  room.NullBool:
    properties:
      bool:
        type: boolean
      valid:
        type: boolean
    type: object
  room.NullString:
    properties:
      string:
        type: string
      valid:
        type: boolean
    type: object
  room.NullTime:
    properties:
      time:
        type: string
      valid:
        type: boolean
    type: object
  room.NullUUID:
    properties:
      uuid:
        type: string
      valid:
        type: boolean
    type: object
  room.QuestionDTO:
    properties:
      created_at:
        type: string
      description:
        type: string
      done:
        type: boolean
      id:
        type: integer
      is_code:
        type: boolean
      passed:
        $ref: '#/definitions/room.NullBool'
      room_id:
        type: string
      title:
        type: string
      updated_at:
        type: string
    type: object
  room.QuestionsResponseDTO:
    properties:
      is_owner:
        type: boolean
      questions:
        items:
          $ref: '#/definitions/room.QuestionDTO'
        type: array
    type: object
  room.RescheduleRoomRequest:
    properties:
      start_time:
        type: string
    type: object
  room.RoomDTO:
    properties:
      company:
        type: string
      created_at:
        type: string
      description:
        type: string
      ended_at:
        $ref: '#/definitions/room.NullTime'
      feedback:
        $ref: '#/definitions/room.NullString'
      id:
        type: string
      owner_id:
        type: string
      participant_id:
        $ref: '#/definitions/room.NullUUID'
      passed:
        $ref: '#/definitions/room.NullBool'
      role:
        type: string
      start_time:
        type: string
      started_at:
        $ref: '#/definitions/room.NullTime'
      status:
        type: string
      updated_at:
        type: string
    type: object
  room.RoomDetailsResponseDTO:
    properties:
      company:
        type: string
      created_at:
        type: string
      description:
        type: string
      ended_at:
        $ref: '#/definitions/room.NullTime'
      feedback:
        $ref: '#/definitions/room.NullString'
      id:
        type: string
      is_owner:
        type: boolean
      is_participant:
        type: boolean
      owner_id:
        type: string
      participant_id:
        $ref: '#/definitions/room.NullUUID'
      passed:
        $ref: '#/definitions/room.NullBool'
      role:
        type: string
      start_time:
        type: string
      started_at:
        $ref: '#/definitions/room.NullTime'
      status:
        type: string
      updated_at:
        type: string
    type: object
  room.SubmitAnswerRequest:
    properties:
      answer:
        type: string
    type: object
  room.SubmitCodeRequest:
    properties:
      code:
        type: string
      language:
        type: string
    type: object
  room.SubmitFeedbackRequest:
    properties:
      feedback:
        type: string
      passed:
        type: boolean
    type: object
  user.UserDashboardStats:
    properties:
      completed_interview_count:
        type: integer
      pass_rate:
        type: number
      total_interview_count:
        type: integer
      upcoming_interview_count:
        type: integer
      user_image:
        type: string
      username:
        type: string
    type: object
  user.UserOauthSetting:
    properties:
      created_at:
        type: string
      provider:
        type: string
      updated_at:
        type: string
    type: object
  user.UserProfileResponse:
    properties:
      email:
        type: string
      profile_picture_url:
        type: string
      username:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: API for Devora - a platform for live technical interviews
  title: Devora API
  version: "1.0"
paths:
  /api/rooms:
    get:
      description: Returns the filtered list of rooms (owned or participated in) by
        the current user.
      operationId: getRooms
      parameters:
      - description: Comma-separated room statuses (pending,live,reviewing,completed,cancelled)
        in: query
        name: status
        type: string
      - description: Limit number of results
        in: query
        name: limit
        type: integer
      - description: Offset for pagination
        in: query
        name: offset
        type: integer
      - description: Filter by type (owner, participant)
        in: query
        name: type
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/room.RoomDTO'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/lib.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/lib.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get rooms for current user
      tags:
      - Rooms
    post:
      consumes:
      - application/json
      description: Creates a new interview room with a specific role, company, description,
        and start time.
      operationId: createRoom
      parameters:
      - description: Create room request body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/room.CreateRoomRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/lib.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/lib.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/lib.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a new room
      tags:
      - Rooms
  /api/rooms/{room_id}:
    delete:
      description: Deletes a room if it is owned by the authenticated user.
      operationId: deleteRoom
      parameters:
      - description: Room ID
        in: path
        name: room_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/lib.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/lib.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/lib.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/lib.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete a room
      tags:
      - Rooms
    get:
      description: Returns the detailed room configuration including owner/participant
        flags.
      operationId: getRoomByID
      parameters:
      - description: Room ID
        in: path
        name: room_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/room.RoomDetailsResponseDTO'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/lib.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/lib.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get room by ID
      tags:
      - Rooms
    put:
      consumes:
      - application/json
      description: Updates a room's role, company, description, and start time.
      operationId: updateRoom
      parameters:
      - description: Room ID
        in: path
        name: room_id
        required: true
        type: string
      - description: Update room request body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/room.CreateRoomRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/lib.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/lib.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/lib.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/lib.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update a room
      tags:
      - Rooms
  /api/rooms/{room_id}/cancel:
    patch:
      description: Sets a room's status to cancelled.
      operationId: cancelRoom
      parameters:
      - description: Room ID
        in: path
        name: room_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/lib.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/lib.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/lib.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/lib.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Cancel a room
      tags:
      - Rooms
  /api/rooms/{room_id}/join:
    patch:
      description: Adds the authenticated user as the participant in a pending room.
      operationId: joinRoom
      parameters:
      - description: Room ID
        in: path
        name: room_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/lib.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/lib.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/lib.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/lib.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Join a room as participant
      tags:
      - Rooms
  /api/rooms/{room_id}/leave:
    patch:
      description: Removes the participant from a pending room.
      operationId: leaveRoom
      parameters:
      - description: Room ID
        in: path
        name: room_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/lib.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/lib.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/lib.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/lib.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Leave a room or remove participant
      tags:
      - Rooms
  /api/rooms/{room_id}/questions:
    get:
      description: Returns the list of scheduled questions in a specific room, filtering
        by participant state if appropriate.
      operationId: getRoomQuestions
      parameters:
      - description: Room ID
        in: path
        name: room_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/room.QuestionsResponseDTO'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/lib.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/lib.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/lib.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get questions for a room
      tags:
      - Questions
    post:
      consumes:
      - application/json
      description: Adds a new scheduled coding/interview question to a pending interview
        room.
      operationId: createQuestion
      parameters:
      - description: Room ID
        in: path
        name: room_id
        required: true
        type: string
      - description: Create question request body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/room.CreateQuestionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/lib.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/lib.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/lib.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/lib.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a question in a room
      tags:
      - Questions
  /api/rooms/{room_id}/questions/{question_id}:
    delete:
      description: Removes a scheduled question from a pending interview room.
      operationId: deleteQuestion
      parameters:
      - description: Room ID
        in: path
        name: room_id
        required: true
        type: string
      - description: Question ID
        in: path
        name: question_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/lib.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/lib.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/lib.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/lib.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete a question from a room
      tags:
      - Questions
  /api/rooms/{room_id}/questions/{question_id}/answer:
    get:
      description: Returns the saved free-text answer for a scheduled room question.
      operationId: getAnswer
      parameters:
      - description: Room ID
        in: path
        name: room_id
        required: true
        type: string
      - description: Question ID
        in: path
        name: question_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/room.AnswerDTO'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/lib.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/lib.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get answer for a question
      tags:
      - Answers
    post:
      consumes:
      - application/json
      description: Saves a free-text question answer for an interview candidate.
      operationId: submitAnswer
      parameters:
      - description: Room ID
        in: path
        name: room_id
        required: true
        type: string
      - description: Question ID
        in: path
        name: question_id
        required: true
        type: integer
      - description: Submit answer request body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/room.SubmitAnswerRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/lib.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/lib.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/lib.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/lib.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Submit an answer for a question
      tags:
      - Answers
  /api/rooms/{room_id}/questions/{question_id}/code:
    get:
      description: Returns the saved code snippet for a scheduled room question.
      operationId: getCode
      parameters:
      - description: Room ID
        in: path
        name: room_id
        required: true
        type: string
      - description: Question ID
        in: path
        name: question_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/room.CodeSnippetDTO'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/lib.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/lib.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get code for a question
      tags:
      - Answers
    post:
      consumes:
      - application/json
      description: Saves a code snippet answer for a scheduled room question.
      operationId: submitCode
      parameters:
      - description: Room ID
        in: path
        name: room_id
        required: true
        type: string
      - description: Question ID
        in: path
        name: question_id
        required: true
        type: integer
      - description: Submit code request body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/room.SubmitCodeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/lib.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/lib.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/lib.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/lib.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Submit code for a question
      tags:
      - Answers
  /api/rooms/{room_id}/questions/{question_id}/fail:
    patch:
      description: Updates a room question status to failed.
      operationId: failQuestion
      parameters:
      - description: Room ID
        in: path
        name: room_id
        required: true
        type: string
      - description: Question ID
        in: path
        name: question_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/lib.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/lib.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/lib.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Mark a question as failed
      tags:
      - Questions
  /api/rooms/{room_id}/questions/{question_id}/pass:
    patch:
      description: Updates a room question status to passed.
      operationId: passQuestion
      parameters:
      - description: Room ID
        in: path
        name: room_id
        required: true
        type: string
      - description: Question ID
        in: path
        name: question_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/lib.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/lib.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/lib.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Mark a question as passed
      tags:
      - Questions
  /api/rooms/{room_id}/reschedule:
    patch:
      consumes:
      - application/json
      description: Sets a cancelled room back to pending with a new start time.
      operationId: rescheduleRoom
      parameters:
      - description: Room ID
        in: path
        name: room_id
        required: true
        type: string
      - description: Reschedule room request body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/room.RescheduleRoomRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/lib.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/lib.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/lib.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/lib.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Reschedule a cancelled room
      tags:
      - Rooms
  /api/rooms/{room_id}/submit-feedback:
    patch:
      consumes:
      - application/json
      description: Saves feedback notes and interview pass/fail outcomes, changing
        the room's status to completed.
      operationId: submitFeedback
      parameters:
      - description: Room ID
        in: path
        name: room_id
        required: true
        type: string
      - description: Submit feedback request body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/room.SubmitFeedbackRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/lib.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/lib.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/lib.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/lib.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Submit feedback for a room
      tags:
      - Rooms
  /api/users/{user_id}:
    get:
      description: Returns public profile details of a user by UUID.
      operationId: getUser
      parameters:
      - description: User ID
        in: path
        name: user_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/user.UserProfileResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/lib.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/lib.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get user by ID
      tags:
      - Users
  /api/users/dashboard:
    get:
      description: Returns stats like total interview count, upcoming count, completed
        count and pass rate for the current user.
      operationId: getDashboardStat
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/user.UserDashboardStats'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/lib.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/lib.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get dashboard statistics
      tags:
      - Users
  /api/users/profile:
    get:
      description: Returns the profile username, email, and picture URL for the authenticated
        user.
      operationId: getUserData
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/user.UserProfileResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/lib.ErrorResponse'
